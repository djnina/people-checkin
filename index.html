
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>People Check-In</title>

    <meta name="theme-color" content="#f7f2ea">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <h1>People Check-In</h1>

        <div class="header-actions">
            <button id="addPersonBtn">
                + Add Person
            </button>

            <button id="statsBtn">
                Statistics
            </button>
        </div>
    </header>

    <main>

        <section class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="Search people or notes..."
            >
        </section>

        <section class="dashboard-section">
            <h2>🔴 Who Needs Attention</h2>
            <div id="attentionList" class="card-list"></div>
        </section>

        <section class="dashboard-section">
            <h2>🟡 Planned</h2>
            <div id="plannedList" class="card-list"></div>
        </section>

        <section class="dashboard-section">
            <h2>🎂 Upcoming Birthdays</h2>
            <div id="birthdayList" class="card-list"></div>
        </section>

        <section class="dashboard-section">
            <h2>🟠 Meet Up Soon</h2>
            <div id="meetupList" class="card-list"></div>
        </section>

        <section class="dashboard-section">
            <h2>🟢 Everyone Else</h2>
            <div id="everyoneList" class="card-list"></div>
        </section>

    </main>

    <!-- Add/Edit Person Modal -->

    <div id="personModal" class="modal hidden">

        <div class="modal-content">

            <h2>Add Person</h2>

            <label>Name</label>
            <input type="text" id="personName">

            <label>Category</label>
            <select id="personCategory">
                <option value="inner">
                    ❤️ Inner Circle
                </option>

                <option value="close">
                    😊 Close Friend
                </option>

                <option value="friend">
                    🙂 Friend
                </option>

                <option value="community">
                    🌱 Community
                </option>
            </select>

            <label>Relationship Types</label>

<div class="checkbox-row">
    <label>
        <input type="checkbox" id="typeLocal">
        📍 Local
    </label>
</div>

<div class="checkbox-row">
    <label>
        <input type="checkbox" id="typeLongDistance">
        🌍 Long Distance
    </label>
</div>

<div class="checkbox-row">
    <label>
        <input type="checkbox" id="typeProfessional">
        💼 Professional
    </label>
</div>

<div class="checkbox-row">
    <label>
        <input type="checkbox" id="typeBachata">
        💃 Bachata / Community
    </label>
</div>
            
            <label>Birthday (optional)</label>
            <input type="date" id="personBirthday">

            <label>Contact Frequency (days)</label>
            <input
                type="number"
                id="contactFrequency"
            >

            <label>Meetup Frequency (days)</label>
            <input
                type="number"
                id="meetupFrequency"
            >

            <label>
                <input
                    type="checkbox"
                    id="importantPerson"
                >
                Important ⭐
            </label>

            <label>Notes</label>
            <textarea
                id="personNotes"
                rows="5"
            ></textarea>

            <div class="modal-buttons">

                <button id="savePersonBtn">
                    Save
                </button>

                <button id="cancelPersonBtn">
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <!-- Person Drawer -->

    <div id="personDrawer" class="drawer">

        <div class="drawer-content">

            <div class="drawer-handle"></div>

            <div id="drawerBody">

                <!-- Filled by JS -->

            </div>

        </div>

    </div>

    <!-- Statistics Modal -->

    <div id="statsModal" class="modal hidden">

        <div class="modal-content large">

            <h2>Statistics</h2>

            <div id="statsContent"></div>

            <button id="closeStatsBtn">
                Close
            </button>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
